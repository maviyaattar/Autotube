<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{

      --gold:#ffd166;
      --white:#ffffff;
      --shadow:
      0 0 40px rgba(0,0,0,0.6);

      --glass:
      rgba(255,255,255,0.05);

      --border:
      rgba(255,255,255,0.08);
    }

    body{

      width:1080px;
      height:1920px;

      overflow:hidden;

      position:relative;

      display:flex;
      justify-content:center;
      align-items:center;

      background:#000;

      font-family:'Poppins',sans-serif;
    }

    /* ===================================== */
    /* BACKGROUND */
    /* ===================================== */

    .bg{

      position:absolute;

      inset:0;

      width:100%;
      height:100%;

      object-fit:cover;

      transform:scale(1.08);

      filter:

      brightness(0.85)
      contrast(1.05)
      saturate(1.1);

      animation:
      zoom 18s linear infinite;
    }

    @keyframes zoom{

      0%{
        transform:scale(1.08);
      }

      100%{
        transform:scale(1.15);
      }
    }

    /* ===================================== */
    /* OVERLAY */
    /* ===================================== */

    .overlay{

      position:absolute;

      inset:0;

      background:

      linear-gradient(

        to bottom,

        rgba(0,0,0,0.55),

        rgba(0,0,0,0.35),

        rgba(0,0,0,0.7)

      );

      backdrop-filter:blur(2px);
    }

    /* ===================================== */
    /* TOP GLOW */
    /* ===================================== */

    .top-glow{

      position:absolute;

      top:-200px;
      left:50%;

      transform:
      translateX(-50%);

      width:900px;
      height:900px;

      border-radius:50%;

      background:

      radial-gradient(

        circle,

        rgba(255,209,102,0.22),

        transparent 70%

      );

      filter:blur(50px);
    }

    /* ===================================== */
    /* MAIN CONTAINER */
    /* ===================================== */

    .container{

      position:relative;

      width:86%;

      padding:80px 70px;

      border-radius:50px;

      background:var(--glass);

      border:1px solid var(--border);

      backdrop-filter:blur(14px);

      box-shadow:

      0 20px 80px rgba(0,0,0,0.45),

      inset 0 0 20px rgba(255,255,255,0.03);

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      overflow:hidden;
    }

    /* ===================================== */
    /* SHINE EFFECT */
    /* ===================================== */

    .container::before{

      content:'';

      position:absolute;

      top:-120%;
      left:-50%;

      width:200%;
      height:200%;

      background:

      linear-gradient(

        120deg,

        transparent,

        rgba(255,255,255,0.08),

        transparent

      );

      transform:rotate(20deg);

      animation:
      shine 8s linear infinite;
    }

    @keyframes shine{

      0%{
        transform:
        translateX(-100%)
        rotate(20deg);
      }

      100%{
        transform:
        translateX(100%)
        rotate(20deg);
      }
    }

    /* ===================================== */
    /* TITLE */
    /* ===================================== */

    .title{

      font-family:'Cinzel',serif;

      font-size:40px;

      font-weight:700;

      color:var(--gold);

      letter-spacing:6px;

      text-transform:uppercase;

      margin-bottom:40px;

      text-shadow:

      0 0 30px rgba(255,209,102,0.5);
    }

    /* ===================================== */
    /* QUOTE */
    /* ===================================== */

    .quote{

      color:var(--white);

      font-size:74px;

      line-height:1.32;

      text-align:center;

      font-weight:800;

      text-shadow:

      0 0 25px rgba(255,255,255,0.18),

      0 8px 40px rgba(0,0,0,0.75);

      word-break:break-word;
    }

    /* ===================================== */
    /* FOOTER */
    /* ===================================== */

    .footer{

      position:absolute;

      bottom:90px;

      left:50%;

      transform:
      translateX(-50%);

      display:flex;
      align-items:center;
      gap:20px;

      padding:

      18px 40px;

      border-radius:100px;

      background:

      rgba(255,255,255,0.06);

      border:

      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(10px);

      box-shadow:
      var(--shadow);
    }

    .footer-dot{

      width:12px;
      height:12px;

      border-radius:50%;

      background:var(--gold);

      box-shadow:

      0 0 20px rgba(255,209,102,0.8);
    }

    .footer-text{

      color:white;

      font-size:28px;

      font-weight:600;

      letter-spacing:4px;
    }

    /* ===================================== */
    /* CORNER ORNAMENTS */
    /* ===================================== */

    .corner{

      position:absolute;

      width:180px;
      height:180px;

      border:

      2px solid rgba(255,209,102,0.35);
    }

    .corner.top-left{

      top:50px;
      left:50px;

      border-right:none;
      border-bottom:none;

      border-radius:40px 0 0 0;
    }

    .corner.top-right{

      top:50px;
      right:50px;

      border-left:none;
      border-bottom:none;

      border-radius:0 40px 0 0;
    }

    .corner.bottom-left{

      bottom:50px;
      left:50px;

      border-right:none;
      border-top:none;

      border-radius:0 0 0 40px;
    }

    .corner.bottom-right{

      bottom:50px;
      right:50px;

      border-left:none;
      border-top:none;

      border-radius:0 0 40px 0;
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <img
    class="bg"
    src="{{BACKGROUND_URL}}"
  />

  <!-- DARK OVERLAY -->

  <div class="overlay"></div>

  <!-- TOP GLOW -->

  <div class="top-glow"></div>

  <!-- CORNERS -->

  <div class="corner top-left"></div>
  <div class="corner top-right"></div>

  <div class="corner bottom-left"></div>
  <div class="corner bottom-right"></div>

  <!-- MAIN CONTENT -->

  <div class="container">

    <div class="title">

      {{HEADER_TEXT}}

    </div>

    <div class="quote">

      {{QUOTE_TEXT}}

    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    <div class="footer-dot"></div>

    <div class="footer-text">

      AUTOTUBE AI

    </div>

  </div>

</body>

</html>
